<style>
  .kpi,
  .table-card,
  .panel,
  .compare-card,
  .compare-technical-card,
  .compare-main-card,
  .empty,
  .error {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .home-hero-logo {
    width: clamp(118px, 14vw, 176px);
    height: clamp(118px, 14vw, 176px);
    border-radius: 50%;
    border: 1px solid var(--line);
    background:
      radial-gradient(circle at 30% 28%, color-mix(in srgb, white 92%, var(--chip)), color-mix(in srgb, var(--chip) 84%, transparent));
    box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.08), 0 22px 40px rgba(15, 31, 54, 0.14);
    display: grid;
    place-items: center;
    margin-bottom: 12px;
  }

  .home-hero-logo img {
    width: clamp(74px, 9vw, 110px);
    height: clamp(74px, 9vw, 110px);
    display: block;
    object-fit: contain;
  }

  .title {
    margin: 0;
    font-size: 52px;
    line-height: 0.92;
    letter-spacing: 0;
    max-width: 14ch;
  }

  .title-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }

  .title-row .title {
    flex: 0 1 auto;
  }

  .title-meta {
    color: var(--muted);
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 4px;
    max-width: 44ch;
  }

  .title-inline-result {
    max-width: 100%;
    white-space: nowrap;
    overflow-wrap: normal;
    font-size: clamp(18px, 3.4vw, 52px);
  }

  .subtitle {
    margin: 8px 0 16px;
    color: var(--muted);
    font-size: 15px;
    max-width: 70ch;
  }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }

  .kpi {
    min-height: 92px;
    padding: 10px;
    display: grid;
    align-content: start;
    gap: 4px;
    background:
      radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--brand-1) 14%, transparent), transparent 42%),
      linear-gradient(145deg, color-mix(in srgb, var(--chip) 92%, white 8%), color-mix(in srgb, var(--brand-1) 7%, transparent));
    box-shadow: var(--shadow-soft);
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }

  .kpi-link {
    color: var(--text);
    text-decoration: none;
  }

  .kpi-wide {
    grid-column: span 2;
  }

  .kpi:hover {
    transform: translateY(-2px);
    box-shadow: 0 28px 64px rgba(15, 31, 54, 0.14);
  }

  .kpi .k {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .kpi .v {
    font-size: clamp(17px, 2vw, 22px);
    font-weight: 900;
    line-height: 1.28;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .kpi-secondary {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.35;
  }

  .kpi-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .kpi-meta-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 900;
  }

  .card-symbol {
    width: 12px;
    height: 16px;
    display: inline-block;
    border-radius: 2px;
    box-shadow: 0 1px 2px rgba(15, 31, 54, 0.28);
    transform: rotate(3deg);
  }

  .card-symbol.is-yellow-card {
    background: #facc15;
  }

  .card-symbol.is-red-card {
    background: #ef4444;
  }

  .grid {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 10px;
    align-items: start;
  }

  .single-column {
    grid-template-columns: 1fr;
  }

  .entity-detail-grid {
    gap: 14px;
  }

  .home-dashboard {
    display: grid;
    grid-template-columns: 0.8fr 1.2fr;
    gap: 10px;
    align-items: start;
  }

  .home-main-table {
    grid-column: span 1;
  }

  .home-side-stack {
    display: grid;
    gap: 8px;
    align-content: start;
  }

  .home-leaders-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .home-leader-card table {
    font-size: 12px;
  }

  .home-leader-card th,
  .home-leader-card td {
    padding: 8px 7px;
  }

  .home-side-stack .panel {
    min-height: 0;
  }

  .table-card,
  .panel,
  .compare-card,
  .compare-technical-card,
  .compare-main-card {
    min-height: 220px;
    overflow: hidden;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }

  .panel.panel--overflow-visible {
    overflow: visible;
  }

  /* Ensure the match-detail timeline panel and its body don't clip positioned events */
  .match-detail-grid .panel.panel--overflow-visible,
  .match-detail-grid .panel.panel--overflow-visible .body {
    overflow: visible !important;
  }

  .table-card:hover,
  .panel:hover,
  .compare-card:hover,
  .compare-technical-card:hover,
  .compare-main-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 28px 64px rgba(15, 31, 54, 0.14);
  }

  .head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(180deg, color-mix(in srgb, var(--chip) 92%, white 8%), var(--chip));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .head h2,
  .head h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.15;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .body {
    padding: 10px;
  }

  .table-wrap {
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th,
  td {
    text-align: left;
    vertical-align: top;
    padding: 9px 10px;
    border-bottom: 1px solid var(--line-soft);
    word-break: break-word;
  }

  .table-link {
    color: var(--brand-1);
    font-weight: 800;
    text-decoration: none;
  }

  .table-link:hover {
    text-decoration: underline;
  }

  .player-name-with-captain {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
  }

  .captain-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    border: 1px solid color-mix(in srgb, var(--brand-1) 58%, var(--line));
    border-radius: 50%;
    background: color-mix(in srgb, var(--brand-1) 12%, var(--chip));
    color: var(--brand-1);
    font-size: 11px;
    font-weight: 900;
    line-height: 1;
  }

  th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: color-mix(in srgb, var(--chip) 92%, white 8%);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
  }

  .table-head-btn {
    min-height: 30px;
    padding: 6px 10px;
    font-size: 12px;
    flex: 0 0 auto;
  }

  .table-btn {
    min-height: 30px;
    padding: 6px 10px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  .source-note {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: right;
  }

  .segmented {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    background: color-mix(in srgb, var(--chip) 88%, white 12%);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .segmented button {
    min-height: 30px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 5px 9px;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }

  .segmented button span {
    min-width: 20px;
    border-radius: 999px;
    padding: 2px 6px;
    background: color-mix(in srgb, var(--panel) 82%, white 18%);
    color: var(--muted);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }

  .segmented button.is-active {
    color: #fff;
    background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
    box-shadow: 0 10px 18px color-mix(in srgb, var(--brand-1) 20%, transparent);
  }

  .segmented button.is-active span {
    color: var(--brand-1);
    background: rgba(255, 255, 255, 0.92);
  }

  .player-match-head {
    align-items: flex-start;
  }

  .player-stat-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    align-items: start;
  }

  .player-stat-section {
    min-width: 0;
    overflow: hidden;
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    background: color-mix(in srgb, var(--panel) 88%, var(--chip) 12%);
  }

  .player-stat-section h3 {
    margin: 0;
    padding: 9px 12px;
    border-bottom: 1px solid var(--line-soft);
    background: color-mix(in srgb, var(--chip) 76%, var(--panel) 24%);
    color: var(--text);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1.2;
    text-transform: uppercase;
  }

  .player-stat-section h3 span {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .player-stat-section h3 span::before {
    content: "";
    width: 4px;
    height: 16px;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--brand-1), var(--brand-2));
    flex: 0 0 auto;
  }

  .player-stat-list {
    margin: 0;
    padding: 0;
  }

  .player-stat-item {
    min-height: 35px;
    padding: 8px 10px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: baseline;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13px;
  }

  .player-stat-item:last-child {
    border-bottom: 0;
  }

  .player-stat-item dt,
  .player-stat-item dd {
    min-width: 0;
    margin: 0;
    overflow-wrap: anywhere;
  }

  .player-stat-item dt {
    color: var(--muted);
    font-weight: 800;
  }

  .player-stat-item dd {
    justify-self: end;
    text-align: right;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .is-hidden {
    display: none;
  }

  .rank-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }

  .rank-list li {
    min-height: 38px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 14px;
  }

  .rank-list li:last-child {
    border-bottom: 0;
  }

  .rank-list strong {
    font-variant-numeric: tabular-nums;
  }

  .result-chart {
    display: grid;
    grid-template-columns: minmax(126px, 0.56fr) minmax(0, 1fr);
    align-items: center;
    gap: 12px;
  }

  .result-pie {
    width: min(150px, 100%);
    aspect-ratio: 1;
    margin: 0 auto;
    border: 1px solid var(--line-soft);
    border-radius: 50%;
    position: relative;
    background:
      conic-gradient(
        #0a66c2 0 var(--home-pct),
        #64748b var(--home-pct) calc(var(--home-pct) + var(--draw-pct)),
        #f59e0b calc(var(--home-pct) + var(--draw-pct)) 100%
      );
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32);
  }

  .result-dot.is-home {
    background: #0a66c2;
  }

  .result-dot.is-draw {
    background: #64748b;
  }

  .result-dot.is-away {
    background: #f59e0b;
  }

  .result-list {
    display: grid;
    gap: 8px;
  }

  .result-item {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }

  .result-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }

  .list li {
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--chip) 94%, white 6%), var(--chip));
    padding: 9px;
    font-size: 14px;
    line-height: 1.35;
    overflow-wrap: anywhere;
  }

  .elo-chart {
    display: grid;
    gap: 10px;
    position: relative;
  }

  .elo-svg {
    width: 100%;
    min-height: 320px;
    height: auto;
    display: block;
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--chip) 92%, white 8%), var(--chip));
    cursor: crosshair;
  }

  [data-view="teams"] .elo-svg {
    min-height: 560px;
  }

  [data-view="teams"] {
    grid-template-columns: minmax(220px, 1fr) minmax(0, 3fr);
  }

  [data-view="team-detail"] .elo-svg {
    min-height: 500px;
  }

  .elo-point-dot {
    pointer-events: none;
  }

  .elo-hit-point {
    pointer-events: all;
    cursor: crosshair;
    fill: transparent;
    stroke: transparent;
  }

  .elo-hit-point:hover,
  .elo-hit-point:focus-visible {
    outline: none;
  }

  .elo-hit-line {
    pointer-events: none;
    cursor: crosshair;
    fill: none;
    stroke: transparent;
  }

  .elo-hit-line:hover,
  .elo-hit-line:focus-visible {
    outline: none;
  }

  .elo-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .elo-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 8px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    background: color-mix(in srgb, var(--chip) 92%, white 8%);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
  }

  .elo-item:hover {
    border-color: var(--text);
    background: color-mix(in srgb, var(--chip) 100%, white 0%);
    transform: scale(1.04);
  }

  .elo-item:active {
    transform: scale(0.98);
  }

  .elo-item[data-team-active="false"] {
    opacity: 0.4;
    border-color: var(--line-soft);
  }

  .elo-item[data-team-active="false"]:hover {
    opacity: 0.7;
  }

  .elo-swatch {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    flex: 0 0 auto;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
  }

  .elo-extremes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
  }

  .elo-extreme-item {
    display: grid;
    gap: 5px;
    padding: 9px 10px;
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    background: color-mix(in srgb, var(--chip) 90%, white 10%);
    font-size: 12px;
  }

  .elo-extreme-team {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
    font-weight: 900;
    overflow-wrap: anywhere;
  }

  .elo-extreme-values {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 7px;
    color: var(--muted);
    font-weight: 800;
  }

  .elo-extreme-values strong {
    display: block;
    color: var(--text);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }

  .elo-tooltip {
    position: fixed;
    z-index: 30;
    display: none;
    max-width: 300px;
    padding: 12px 14px;
    border: 2px solid var(--brand-1);
    border-radius: 12px;
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    font-size: 13px;
    font-weight: 700;
    pointer-events: none;
    white-space: pre-line;
    line-height: 1.5;
    word-break: break-word;
    animation: tooltipFadeIn 0.15s ease-out;
  }

  @keyframes tooltipFadeIn {
    from {
      opacity: 0;
      transform: scale(0.95);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .elo-tooltip.is-visible {
    display: block;
  }

  .compare-layout {
    display: grid;
    gap: 10px;
  }

  .compare-head {
    align-items: center;
  }

  .compare-type-form {
    margin-left: auto;
  }

  .compare-type-form select {
    min-height: 36px;
    min-width: 150px;
    padding: 7px 36px 7px 11px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--chip) 94%, white 6%), var(--chip)),
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: 0 0, calc(100% - 18px) 50%, calc(100% - 12px) 50%;
    background-size: 100% 100%, 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    appearance: none;
    outline: none;
  }

  .compare-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
  }

  .compare-form select,
  .compare-form input,
  .compare-form button {
    min-height: 38px;
    padding: 7px 9px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--chip) 94%, white 6%), var(--chip));
    color: var(--text);
    font: inherit;
  }

  .compare-form input {
    width: 100%;
    min-width: 0;
    outline: none;
  }

  .compare-form button {
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
    box-shadow: 0 14px 24px color-mix(in srgb, var(--brand-1) 24%, transparent);
  }

  .compare-versus {
    min-height: 84px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--chip) 94%, white 6%), color-mix(in srgb, var(--brand-2) 10%, var(--chip)));
    box-shadow: var(--shadow-soft);
  }

  .compare-versus strong {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
    color: #fff;
    font-size: 13px;
    letter-spacing: 0;
  }

  .compare-versus-entity {
    min-width: 0;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    line-height: 1.15;
    overflow-wrap: anywhere;
  }

  .compare-summary-grid {
    display: grid;
    grid-template-columns: minmax(240px, 0.92fr) minmax(360px, 1.1fr) minmax(240px, 0.92fr);
    gap: 10px;
    align-items: stretch;
  }

  .compare-technical-card,
  .compare-main-card {
    min-height: 100%;
    overflow: hidden;
  }

  .compare-technical-card .head h2 {
    overflow-wrap: anywhere;
    text-transform: none;
    letter-spacing: 0;
    font-size: 18px;
  }

  .compare-fields {
    display: grid;
    gap: 8px;
  }

  .compare-field {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: 14px;
  }

  .compare-field:last-child {
    border-bottom: 0;
  }

  .compare-field span {
    color: var(--muted);
    font-weight: 800;
  }

  .compare-field strong {
    min-width: 0;
    text-align: right;
    overflow-wrap: anywhere;
  }

  .compare-detail-table {
    min-height: 260px;
  }

  .compare-main-table-wrap,
  .compare-detail-table-wrap {
    padding: 0;
  }

  .compare-main-table-wrap table,
  .compare-detail-table-wrap table {
    font-size: 13px;
  }

  .compare-main-table-wrap th:nth-child(2),
  .compare-main-table-wrap td:nth-child(2),
  .compare-detail-table-wrap th:nth-child(2),
  .compare-detail-table-wrap td:nth-child(2) {
    text-align: center;
  }

  .compare-main-table-wrap th:nth-child(3),
  .compare-main-table-wrap td:nth-child(3),
  .compare-detail-table-wrap th:nth-child(3),
