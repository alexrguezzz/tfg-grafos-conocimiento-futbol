<style>
  html.skip-splash .splash-screen {
    display: none;
  }

  .splash-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: grid;
    place-items: center;
    background: #ffffff;
    color: #0f1f36;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }

  .splash-screen.is-exiting {
    animation: splash-screen-out 0.38s ease forwards;
  }

  .splash-screen.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .splash-card {
    display: grid;
    justify-items: center;
    gap: 14px;
    text-align: center;
    animation: splash-card-in 0.85s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .splash-logo {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, #f7f9fc, #e8eef8);
    box-shadow: 0 20px 40px rgba(15, 31, 54, 0.12);
    animation: splash-logo-in 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .splash-logo img {
    width: 52px;
    height: 52px;
    display: block;
    object-fit: contain;
  }

  .splash-name {
    margin: 0;
    font-size: clamp(30px, 4vw, 48px);
    line-height: 1;
    font-weight: 900;
    letter-spacing: -0.05em;
    animation: splash-name-in 0.95s cubic-bezier(0.2, 0.8, 0.2, 1) 0.08s both;
  }

  .onboarding-screen {
    position: fixed;
    inset: 0;
    z-index: 180;
    display: grid;
    place-items: center;
    padding: clamp(16px, 3vw, 36px);
    background: linear-gradient(180deg, color-mix(in srgb, var(--bg) 92%, var(--panel-strong) 8%), var(--bg));
    color: var(--text);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }

  .onboarding-screen.is-visible {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .onboarding-card {
    width: min(1120px, 100%);
    border: 1px solid var(--line);
    border-radius: 30px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 92%, white 8%), var(--panel-strong));
    box-shadow: 0 34px 90px rgba(15, 31, 54, 0.18);
    padding: clamp(18px, 2.8vw, 28px);
    display: grid;
    gap: 18px;
    transform: translateY(0);
    animation: onboarding-card-in 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .onboarding-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .onboarding-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .onboarding-mark {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, #f7f9fc, #e8eef8);
    box-shadow: 0 16px 34px rgba(15, 31, 54, 0.12);
    flex: 0 0 auto;
  }

  .onboarding-mark img {
    width: 40px;
    height: 40px;
    display: block;
    object-fit: contain;
  }

  .onboarding-kicker {
    margin: 0 0 4px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .onboarding-title {
    margin: 0;
    font-size: clamp(22px, 2.8vw, 36px);
    line-height: 1;
    letter-spacing: -0.04em;
    font-weight: 900;
  }

  .onboarding-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .onboarding-progress-bar {
    flex: 1 1 auto;
    height: 8px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--chip) 72%, white 28%);
    overflow: hidden;
    position: relative;
  }

  .onboarding-progress-bar::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 50%;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
    transition: transform 0.28s ease, width 0.28s ease;
  }

  .onboarding-progress.is-step-2 .onboarding-progress-bar::after {
    width: 100%;
  }

  .onboarding-progress-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    white-space: nowrap;
  }

  .onboarding-form {
    display: grid;
    gap: 16px;
  }

  .onboarding-error,
  .onboarding-empty {
    border: 1px solid color-mix(in srgb, #d93025 34%, var(--line));
    border-radius: 16px;
    background: color-mix(in srgb, #d93025 8%, var(--panel));
    color: var(--text);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.4;
  }

  .onboarding-empty {
    grid-column: 1 / -1;
    border-color: var(--line);
    background: var(--panel);
    color: var(--muted);
  }

  .onboarding-step {
    display: none;
    gap: 18px;
    grid-template-rows: auto 1fr auto;
    min-height: 430px;
    animation: onboarding-step-in 0.35s ease both;
  }

  .onboarding-step.is-active {
    display: grid;
  }

  .onboarding-step.is-leaving {
    animation: onboarding-step-out 0.24s ease both;
  }

  .onboarding-copy {
    display: grid;
    gap: 4px;
  }

  .onboarding-copy h3 {
    margin: 0;
    font-size: clamp(18px, 2.2vw, 24px);
    letter-spacing: -0.03em;
  }

  .onboarding-copy p {
    margin: 0;
    color: var(--muted);
    line-height: 1.45;
    max-width: 60ch;
  }

  .league-grid,
  .season-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    align-content: start;
  }

  .league-card,
  .season-card {
    position: relative;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--chip) 92%, white 8%), var(--panel));
    box-shadow: var(--shadow-soft);
    padding: 14px 12px;
    display: grid;
    justify-items: center;
    gap: 10px;
    text-align: center;
    cursor: pointer;
    min-height: 168px;
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    width: 100%;
  }

  .season-card {
    align-content: center;
  }

  .league-card:hover,
  .season-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 32px rgba(15, 31, 54, 0.12);
    border-color: color-mix(in srgb, var(--brand-1) 28%, var(--line));
  }

  .league-card input,
  .season-card input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .league-card.is-selected,
  .season-card.is-selected {
    border-color: color-mix(in srgb, var(--brand-1) 52%, var(--line));
    background: linear-gradient(180deg, color-mix(in srgb, var(--brand-1) 10%, var(--panel)), color-mix(in srgb, var(--chip) 82%, white 18%));
    box-shadow: 0 18px 34px color-mix(in srgb, var(--brand-1) 18%, transparent);
  }

  .league-mark {
    width: 76px;
    height: 76px;
    display: grid;
    place-items: center;
    position: relative;
    background: transparent;
    box-shadow: none;
    overflow: visible;
  }

  .league-mark img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    display: block;
  }

  .league-fallback {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--brand-1);
    opacity: 0;
  }

  .league-fallback.is-visible {
    opacity: 1;
  }

  .league-name,
  .season-name {
    font-weight: 800;
    line-height: 1.12;
    letter-spacing: -0.02em;
  }

  .season-name {
    font-size: clamp(18px, 2vw, 24px);
  }

  .season-note {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
  }

  .onboarding-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .onboarding-actions .btn {
    min-width: 160px;
  }

  .onboarding-actions .btn.ghost {
    background: transparent;
  }

  @keyframes splash-card-in {
    0% {
      opacity: 0;
      transform: translateY(18px) scale(0.94);
      filter: blur(10px);
    }
    60% {
      opacity: 1;
      transform: translateY(0) scale(1.02);
      filter: blur(0);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }
  }

  @keyframes splash-logo-in {
    0% {
      opacity: 0;
      transform: scale(0.72) rotate(-10deg);
    }
    70% {
      opacity: 1;
      transform: scale(1.06) rotate(0deg);
    }
    100% {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
  }

  @keyframes splash-name-in {
    0% {
      opacity: 0;
      transform: translateY(10px);
      letter-spacing: -0.08em;
    }
    100% {
      opacity: 1;
      transform: translateY(0);
      letter-spacing: -0.05em;
    }
  }

  @keyframes splash-screen-out {
    0% {
      opacity: 1;
    }
    100% {
      opacity: 0;
    }
  }

  .splash-screen.is-exiting .splash-card {
    animation: splash-card-out 0.38s ease forwards;
  }

  @keyframes splash-card-out {
    0% {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }
    100% {
      opacity: 0;
      transform: scale(1.04) translateY(-8px);
      filter: blur(10px);
    }
  }

  @keyframes onboarding-card-in {
    from {
      opacity: 0;
      transform: translateY(16px) scale(0.985);
      filter: blur(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }
  }

  @keyframes onboarding-step-in {
    from {
      opacity: 0;
      transform: translateX(16px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes onboarding-step-out {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(-16px);
    }
  }

  @media (max-width: 1180px) {
    .league-grid,
    .season-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px) {
    .onboarding-card {
      padding: 16px;
      border-radius: 24px;
    }

    .onboarding-header {
      align-items: flex-start;
      flex-direction: column;
    }

    .league-grid,
    .season-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .league-card,
    .season-card {
      min-height: 148px;
    }

    .onboarding-step {
      min-height: auto;
    }
  }
</style>
